name: Publish on NPM

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed by @semantic-release/github to create releases/tags
      issues: write         # needed by semantic-release to comment on issues
      pull-requests: write  # needed by semantic-release to comment on PRs
      id-token: write       # needed for npm provenance (optional but good practice)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # semantic-release needs full git history to determine version bumps

      # ✅ FIX 1: registry-url MUST be set so setup-node writes an .npmrc that
      #           maps NODE_AUTH_TOKEN → https://registry.npmjs.org/:_authToken
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # ✅ FIX 2: semantic-release reads NPM_TOKEN and also honours NODE_AUTH_TOKEN
      #           via the .npmrc written above. Pass both to be safe.
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # always needed for @semantic-release/github
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
