name: Publish on NPM

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write   # ✅ Required for npm Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # semantic-release handles versioning, changelog, and GitHub release.
      # @semantic-release/npm is configured with npmPublish: false (see package.json)
      # so it only bumps the version in package.json — the actual publish is below.
      - name: Version and release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to npm using Trusted Publishing (OIDC — no NPM_TOKEN needed).
      # --provenance attaches a signed attestation so anyone can verify this
      # package was built from your GitHub repo.
      - name: Publish to npm (Trusted Publishing)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}   # set automatically by setup-node via OIDC
